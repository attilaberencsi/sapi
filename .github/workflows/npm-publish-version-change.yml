name: NPM Publish (Version Change)

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .github/workflows/npm-publish-version-change.yml

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"
          PKG_VERSION="${{ steps.pkg.outputs.version }}"

          if npm view "${PKG_NAME}@${PKG_VERSION}" version > /dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} already exists on npm. Skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} not found on npm. Publishing."
          fi

      - name: Configure npm auth and scope
        if: steps.npm_check.outputs.publish == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.npmzero }}" > ~/.npmrc
          echo "@sapdev.eu:registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Publish package
        if: steps.npm_check.outputs.publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npmzero }}
